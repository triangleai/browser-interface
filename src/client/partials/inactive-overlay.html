<div class="inactive-overlay" id="inactive-overlay" hidden>
  <div class="inactive-card">
    <div class="inactive-title">This tab is inactive</div>
    <div class="inactive-body">
      Chrome's Memory Saver has discarded this tab. Reactivating will
      reload the page (any unsaved in-page state will be lost).
    </div>
    <div class="inactive-actions">
      <button id="inactive-cancel" type="button" class="btn-secondary">
        Dismiss
      </button>
      <button id="inactive-revive" type="button" class="btn-primary">
        Reactivate
      </button>
    </div>
  </div>
</div>
