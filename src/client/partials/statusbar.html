<footer class="statusbar">
  <a
    id="hover-link"
    class="hover-link"
    title=""
    target="_blank"
    rel="noopener noreferrer"
  ></a>
  <span id="loading-indicator" class="loading-indicator" hidden>
    <span class="loading-dot"></span>
    loading
  </span>
  <span class="meter-group">
    <span id="cdp-endpoint" class="cdp-endpoint" title="CDP target"></span>
    <span id="fps" class="fps" title="Screencast frames per second">— fps</span>
  </span>
  <span id="status" class="status" data-state="connecting">connecting…</span>
  <button
    id="vp-preset-desktop-narrow"
    class="vp-preset"
    type="button"
    title="Resize remote to desktop width at your phone's aspect ratio"
    aria-label="Resize remote viewport to desktop width with phone aspect"
  >
    <svg
      viewBox="0 0 24 24"
      width="13"
      height="13"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
      aria-hidden="true"
    >
      <rect x="2" y="4" width="20" height="14" rx="2" />
      <line x1="8" y1="22" x2="16" y2="22" />
      <line x1="12" y1="18" x2="12" y2="22" />
    </svg>
  </button>
  <button
    id="vp-preset-mobile"
    class="vp-preset"
    type="button"
    title="Resize remote to your phone's viewport"
    aria-label="Resize remote viewport to phone size"
  >
    <svg
      viewBox="0 0 24 24"
      width="13"
      height="13"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
      aria-hidden="true"
    >
      <rect x="7" y="2" width="10" height="20" rx="2" />
      <line x1="11" y1="18" x2="13" y2="18" />
    </svg>
  </button>
  <button
    id="resize-handle"
    class="resize-handle"
    type="button"
    title="Drag to resize the remote viewport"
    aria-label="Resize remote viewport"
  >
    <svg
      viewBox="0 0 24 24"
      width="14"
      height="14"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
      aria-hidden="true"
    >
      <line x1="10" y1="10" x2="4" y2="4" />
      <polyline points="10 4 4 4 4 10" />
      <line x1="14" y1="14" x2="20" y2="20" />
      <polyline points="20 14 20 20 14 20" />
    </svg>
  </button>
  <div id="resize-readout" class="resize-readout" hidden></div>
</footer>
