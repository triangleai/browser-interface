<div id="find-bar" class="find-bar" hidden>
  <input
    id="find-input"
    class="find-input"
    type="text"
    placeholder="Find on page"
    autocomplete="off"
    spellcheck="false"
    aria-label="Find on page"
  />
  <span id="find-count" class="find-count" aria-live="polite"></span>
  <button
    id="find-prev"
    class="find-btn"
    type="button"
    title="Previous (Shift+Enter)"
    aria-label="Previous match"
  >
    <svg
      viewBox="0 0 24 24"
      width="14"
      height="14"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
      aria-hidden="true"
    >
      <polyline points="18 15 12 9 6 15" />
    </svg>
  </button>
  <button
    id="find-next"
    class="find-btn"
    type="button"
    title="Next (Enter)"
    aria-label="Next match"
  >
    <svg
      viewBox="0 0 24 24"
      width="14"
      height="14"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
      aria-hidden="true"
    >
      <polyline points="6 9 12 15 18 9" />
    </svg>
  </button>
  <button
    id="find-close"
    class="find-btn"
    type="button"
    title="Close (Esc)"
    aria-label="Close"
  >
    <svg
      viewBox="0 0 24 24"
      width="14"
      height="14"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
      aria-hidden="true"
    >
      <line x1="18" y1="6" x2="6" y2="18" />
      <line x1="6" y1="6" x2="18" y2="18" />
    </svg>
  </button>
</div>
