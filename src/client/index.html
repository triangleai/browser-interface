<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Browser Interface</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <nav id="tabs" class="tabs" aria-label="Tabs"></nav>
    <!-- include: partials/toolbar.html -->
    <div id="toast" class="toast" hidden></div>
    <main class="stage" id="stage" tabindex="0">
      <div class="frame" id="frame">
        <img id="screen" alt="" draggable="false" />
        <div class="placeholder" id="placeholder">Waiting for first frame…</div>
        <!-- include: partials/inactive-overlay.html -->
      </div>
      <!-- include: partials/find-bar.html -->
      <!-- include: partials/statusbar.html -->
    </main>
    <input
      id="paste-helper"
      class="paste-helper"
      type="text"
      value=" "
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false"
      aria-label="Clipboard helper"
    />
    <script type="module" src="./main.js"></script>
  </body>
</html>
